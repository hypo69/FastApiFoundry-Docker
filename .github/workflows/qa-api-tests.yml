name: API Integration Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  api-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-qa.txt

    - name: Start FastAPI Server (Background)
      run: |
        $env:API_KEY = "github_actions_test_key"
        Start-Process -FilePath "python" -ArgumentList "run.py" -NoNewWindow
      shell: pwsh

    - name: Wait for API to be Ready
      run: |
        $url = "http://localhost:9696/api/v1/health"
        $retries = 12
        $wait = 5
        Write-Host "Waiting for API at $url..."
        while ($retries -gt 0) {
            try {
                $response = Invoke-RestMethod -Uri $url -Method Get -TimeoutSec 2
                Write-Host "✅ API is up and running!"
                exit 0
            } catch {
                Write-Host "⏳ Server not ready, retrying in $($wait)s... ($($retries) left)"
                $retries--
                Start-Sleep -Seconds $wait
            }
        }
        Write-Host "❌ Error: API failed to start in time."
        exit 1
      shell: pwsh

    - name: Run API Endpoints Tests
      run: |
        $env:API_KEY = "github_actions_test_key"
        powershell -ExecutionPolicy Bypass -File .\tests\Test-ApiEndpoints.ps1
      shell: pwsh