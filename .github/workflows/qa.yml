name: Ai Assistant QA Pipeline

on:
  pull_request:
    branches: [ main, master ]

jobs:
  quality-assurance:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-qa.txt

      - name: Create Dummy Config and Env
        run: |
          copy config.json.example config.json
          copy .env.example .env

      - name: Security Audit
        id: security-audit
        # Продолжаем выполнение workflow, даже если pip-audit найдет уязвимости
        continue-on-error: true
        run: |
          python -m pip_audit --desc on --format json --output tests/reports/audit-ci.json
        shell: pwsh

      - name: Read Audit Report
        id: read-audit-report
        # Всегда пытаемся прочитать отчет, даже если аудит завершился с ошибкой
        if: always()
        run: |
          $reportPath = "tests/reports/audit-ci.json"
          if (Test-Path $reportPath) {
            $reportContent = Get-Content $reportPath -Raw
            # Экранируем символы для передачи в GITHUB_OUTPUT
            $escapedContent = $reportContent -replace "`n", '\n' -replace '"', '\"'
            echo "audit_report_json=$escapedContent" >> $GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Create Security Issue on Vulnerabilities
        # Создаем Issue только если pip-audit обнаружил уязвимости (outcome == 'failure')
        if: steps.security-audit.outcome == 'failure'
        uses: peter-evans/create-issue@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: '🚨 Security Vulnerabilities Detected in PR #${{ github.event.pull_request.number }}'
          body: |
            A security audit has detected vulnerabilities in the project dependencies.
            
            **Details from pip-audit:**
            ```json
            ${{ steps.read-audit-report.outputs.audit_report_json }}
            ```
            
            View full workflow run
          labels: security
          assignees: ${{ github.actor }}

      - name: Run Full QA Cycle
        shell: pwsh
        run: |
          ./scripts/Invoke-Qa.ps1 -SkipCoverageReport
