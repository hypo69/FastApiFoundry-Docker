name: Publish Documentation

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'extentions/**'
      - 'mcp-powershell-servers/**'
      - '.github/workflows/deploy-docs.yml'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: TypeDoc — JS/JSDoc → Markdown
  # ─────────────────────────────────────────────
  docs-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate JS docs (TypeDoc)
        working-directory: extentions/browser-extention-summarizer
        run: |
          npx --yes typedoc \
            --plugin typedoc-plugin-markdown \
            --out ../../docs/ru/dev/js \
            --name "Browser Extension" \
            --readme README.md \
            --disableSources \
            --hideGenerator \
            --outputFileStrategy modules \
            --flattenOutputFiles \
            summarizer.js connectors/foundry.js connectors/gemini.js \
            connectors/openai-compat.js connectors/openrouter.js \
            logger.js ui-manager.js

      - uses: actions/upload-artifact@v4
        with:
          name: js-docs
          path: docs/ru/dev/js/

  # ─────────────────────────────────────────────
  # JOB 2: PlatyPS — PowerShell comment-based help → Markdown
  # ─────────────────────────────────────────────
  docs-powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate PowerShell docs (PlatyPS)
        shell: pwsh
        run: |
          Install-Module -Name PlatyPS -Force -Scope CurrentUser -ErrorAction Stop

          $outDir = "docs/ru/dev/powershell"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $servers = Get-ChildItem -Path "mcp-powershell-servers/src/servers" -Filter "*.ps1"
          foreach ($file in $servers) {
            try {
              . $file.FullName -ErrorAction SilentlyContinue 2>$null
            } catch {}
          }

          # Генерируем .md из comment-based help для каждого .ps1
          foreach ($file in $servers) {
            $name = $file.BaseName
            $content = Get-Content $file.FullName -Raw

            # Извлекаем .SYNOPSIS и .DESCRIPTION из comment-based help
            $synopsis = if ($content -match '\.SYNOPSIS\s*\n\s*(.+)') { $Matches[1].Trim() } else { $name }
            $description = if ($content -match '\.DESCRIPTION\s*\n([\s\S]+?)(?=\n\.[A-Z]|\n#>)') { $Matches[1].Trim() } else { '' }
            $notes = if ($content -match '\.NOTES\s*\n([\s\S]+?)(?=\n\.[A-Z]|\n#>)') { $Matches[1].Trim() } else { '' }

            $md = @"
# $name

$synopsis

## Description

$description

$(if ($notes) { "## Notes`n`n$notes" })

## Source

File: ``mcp-powershell-servers/src/servers/$($file.Name)``
"@
            $md | Set-Content -Path "$outDir/$name.md" -Encoding UTF8
          }

          # Индексная страница
          $index = "# PowerShell MCP Servers`n`n"
          foreach ($file in $servers) {
            $index += "- [$($file.BaseName)]($($file.BaseName).md)`n"
          }
          $index | Set-Content -Path "$outDir/index.md" -Encoding UTF8

      - uses: actions/upload-artifact@v4
        with:
          name: ps-docs
          path: docs/ru/dev/powershell/

  # ─────────────────────────────────────────────
  # JOB 3: MkDocs deploy (зависит от JS + PS docs)
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [docs-js, docs-powershell]
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      # Скачиваем сгенерированные docs из предыдущих job'ов
      - uses: actions/download-artifact@v4
        with:
          name: js-docs
          path: docs/ru/dev/js/

      - uses: actions/download-artifact@v4
        with:
          name: ps-docs
          path: docs/ru/dev/powershell/

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
