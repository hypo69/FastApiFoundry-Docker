<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Assistant — Providers</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        body { min-height: 100vh; }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="ext-navbar">
    <div class="brand">⚙️ <span data-i18n="providers.title">Providers &amp; Models</span></div>
    <div class="d-flex gap-2 ms-auto align-items-center">
        <button class="btn btn-sm btn-outline-light" id="import-btn" data-i18n="providers.import">📂 Import</button>
        <button class="btn btn-sm btn-outline-light" id="export-btn" data-i18n="providers.export">💾 Export</button>
        <select class="lang-select form-select form-select-sm"
                style="width:auto;background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)">
            <option value="en">EN</option>
            <option value="ru">RU</option>
            <option value="he">HE</option>
        </select>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none">
</div>

<!-- Tabs -->
<div class="ext-tabs">
    <button class="ext-tab-btn active" data-tab="providers" data-i18n="providers.tab_providers">🔑 Providers &amp; Models</button>
    <button class="ext-tab-btn" data-tab="summarizer" data-i18n="providers.tab_summarizer">🤖 Summarizer</button>
</div>

<div class="container-fluid py-3 px-3" style="max-width:760px">

    <!-- Tab: providers -->
    <div id="tab-providers" class="tab-panel">
        <div id="provider-list"></div>
    </div>

    <!-- Tab: summarizer -->
    <div id="tab-summarizer" class="tab-panel" style="display:none">
        <div class="card">
            <div class="card-body p-0">

                <div class="d-flex align-items-start gap-4 p-3 border-bottom">
                    <label class="fw-500 small mb-0 pt-1" style="width:200px;flex-shrink:0"
                           data-i18n="providers.summary_lang">🌐 Summary language</label>
                    <div class="flex-grow-1">
                        <select id="summary-lang" class="form-select form-select-sm"></select>
                    </div>
                </div>

                <div class="d-flex align-items-start gap-4 p-3 border-bottom">
                    <label class="fw-500 small mb-0 pt-1" style="width:200px;flex-shrink:0"
                           data-i18n="providers.summary_provider">🤖 Provider for summarization</label>
                    <div class="flex-grow-1">
                        <select id="summary-provider" class="form-select form-select-sm">
                            <option value="" data-i18n="providers.use_active_provider">— use active provider —</option>
                        </select>
                        <div class="form-text" data-i18n="providers.summary_provider_hint">
                            Override the active provider specifically for summarization
                        </div>
                    </div>
                </div>

                <div class="d-flex align-items-start gap-4 p-3">
                    <label class="fw-500 small mb-0 pt-1" style="width:200px;flex-shrink:0"
                           data-i18n="providers.summary_model">📌 Model for summarization</label>
                    <div class="flex-grow-1">
                        <select id="summary-model" class="form-select form-select-sm">
                            <option value="" data-i18n="providers.use_active_model">— use active model —</option>
                        </select>
                        <div class="form-text" data-i18n="providers.summary_model_hint">
                            Override the active model specifically for summarization
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</div>

<script src="providers-page.js" type="module"></script>
</body>
</html>
