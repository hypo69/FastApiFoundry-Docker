<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <strong>Gemini Nano</strong>
            <button id="reset-btn" style="width: auto; padding: 4px 8px; font-size: 11px; margin: 0;">Reset</button>
        </div>
        
        <div id="chat-area" class="chat-area">
            Напишите что-нибудь, чтобы начать общение с локальной моделью.
        </div>

        <div class="input-area">
            <textarea id="user-input" placeholder="Введите ваш запрос..."></textarea>
            <button id="send-btn">Отправить запрос</button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
