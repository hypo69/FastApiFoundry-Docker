<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Recommender</title>
  <style>
    body { font-family: system-ui, sans-serif; width: 320px; padding: 12px; margin: 0; }
    h2 { font-size: 15px; margin: 0 0 10px; }
    #status { font-size: 12px; color: #666; margin-bottom: 8px; }
    button { width: 100%; padding: 8px; background: #2563eb; color: #fff;
             border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:disabled { background: #93c5fd; cursor: default; }
    #result { margin-top: 10px; font-size: 13px; white-space: pre-wrap;
              max-height: 300px; overflow-y: auto; }
    #server-row { display: flex; gap: 6px; margin-bottom: 8px; }
    #server-row input { flex: 1; padding: 4px 6px; font-size: 12px;
                        border: 1px solid #d1d5db; border-radius: 4px; }
    #server-row button { width: auto; padding: 4px 10px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>🤖 AI Recommender</h2>
  <div id="server-row">
    <input id="server-url" type="text" placeholder="http://localhost:9696">
    <button id="save-btn">Save</button>
  </div>
  <div id="status">Loading...</div>
  <button id="recommend-btn">Get Recommendations</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
