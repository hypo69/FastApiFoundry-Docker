<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Foundry - Chat Interface</title>
    <link rel="icon" type="image/png" sizes="16x16"   href="/static/assets/icons/icon16.png">
    <link rel="icon" type="image/png" sizes="48x48"   href="/static/assets/icons/icon48.png">
    <link rel="icon" type="image/png" sizes="128x128" href="/static/assets/icons/icon128.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
</head>
<body>
    <!-- Этот файл chat.html предназначен для отдельного чат-интерфейса. -->
    <!-- Его содержимое должно быть аналогично вкладке Chat в index.html, -->
    <!-- но с полной HTML-структурой и подключением app.js для логики. -->
    <!-- Для рефакторинга index.html, этот файл не изменяется напрямую, -->
    <!-- но его логика переносится в модули JS. -->
    <!-- Здесь должен быть полный HTML-код чата, который будет использовать функции из app.js -->
    <!-- Например: -->
    <div class="container mt-4">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">AI Chat</h5>
                <button class="btn btn-sm btn-outline-secondary" onclick="clearChat()">
                    <i class="bi bi-trash"></i> Clear
                </button>
            </div>
            <div class="card-body">
                <div id="chat-messages" class="chat-container border rounded p-3 mb-3">
                    <div class="text-muted text-center">
                        <i class="bi bi-chat-square-dots"></i><br>
                        Start a conversation with AI
                    </div>
                </div>
                <div class="input-group">
                    <input type="text" id="chat-input" class="form-control" placeholder="Введите сообщение...">
                    <button class="btn btn-primary" onclick="sendMessage()">
                        <i class="bi bi-send"></i> Отправить
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <script type="module" src="/static/app.js"></script>
</body>
</html>
