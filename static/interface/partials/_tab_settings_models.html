<!-- ── HUGGINGFACE ─────────────────────────────────────────────────────── -->
<div class="settings-section settings-section--hf">
    <div class="settings-section-header text-danger">
        <i class="bi bi-boxes"></i> <span data-i18n="settings.huggingface">HuggingFace</span>
    </div>
    <div class="alert alert-info py-2 px-3 mb-3" style="font-size:.85rem">
        <i class="bi bi-key me-1"></i>
        <span data-i18n="settings.hf_token_moved">HuggingFace Token has been moved to the</span>
        <a href="#" onclick="document.getElementById('providers-tab').click();return false;" data-i18n="settings.hf_token_moved_link">API Keys</a>
        <span data-i18n="settings.hf_token_moved_tab">tab.</span>
    </div>
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label d-flex align-items-center gap-1">
                <span data-i18n="settings.device">Device</span>
                <i class="bi bi-question-circle text-muted" style="cursor:help" data-i18n-title="settings.tip_hf_device"></i>
            </label>
            <select id="config-hf-device" class="form-select">
                <option value="auto" data-i18n="settings.device_auto">Auto</option>
                <option value="cpu" data-i18n="settings.device_cpu">CPU</option>
                <option value="cuda" data-i18n="settings.device_cuda">CUDA (GPU)</option>
            </select>
        </div>
        <div class="col-md-6">
            <label class="form-label d-flex align-items-center gap-1">
                <span data-i18n="settings.default_max_tokens">Default Max Tokens</span>
                <i class="bi bi-question-circle text-muted" style="cursor:help" data-i18n-title="settings.tip_hf_max_tokens"></i>
            </label>
            <input type="number" id="config-hf-max-tokens" class="form-control" placeholder="512">
        </div>
        <div class="col-12">
            <label class="form-label d-flex align-items-center gap-1">
                <span data-i18n="settings.dir_hf">Models directory</span>
                <i class="bi bi-question-circle text-muted" style="cursor:help" data-i18n-title="settings.tip_dir_hf"></i>
            </label>
            <input type="text" id="config-dir-hf" class="form-control font-monospace" placeholder="~/.hf_models">
        </div>
    </div>
</div>

<!-- ── LLAMA.CPP ───────────────────────────────────────────────────────── -->
<div class="settings-section settings-section--llama">
    <div class="settings-section-header text-warning">
        <i class="bi bi-cpu"></i> llama.cpp
    </div>
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label d-flex align-items-center gap-1">
                <span data-i18n="settings.port">Port</span>
                <i class="bi bi-question-circle text-muted" style="cursor:help" data-i18n-title="settings.tip_llama_port"></i>
            </label>
            <input type="number" id="config-llama-port" class="form-control" placeholder="9780">
        </div>
        <div class="col-md-6">
            <label class="form-label d-flex align-items-center gap-1">
                <span data-i18n="settings.dir_models">Models directory</span>
                <i class="bi bi-question-circle text-muted" style="cursor:help" data-i18n-title="settings.tip_dir_models"></i>
            </label>
            <input type="text" id="config-llama-models-dir" class="form-control font-monospace" placeholder="~/.models">
        </div>
        <div class="col-12">
            <label class="form-label d-flex align-items-center gap-1">
                <span data-i18n="settings.llama_server_path">Server executable path</span>
                <i class="bi bi-question-circle text-muted" style="cursor:help"></i>
            </label>
            <input type="text" id="config-llama-server-path" class="form-control font-monospace" placeholder="bin/llama-b.../llama-server.exe">
        </div>
        <div class="col-12">
            <label class="form-label d-flex align-items-center gap-1">
                <span data-i18n="settings.dir_models">Models directory</span>
                <i class="bi bi-question-circle text-muted" style="cursor:help" data-i18n-title="settings.tip_dir_models"></i>
            </label>
            <input type="text" id="config-dir-models" class="form-control font-monospace" placeholder="~/.models">
        </div>
        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="config-llama-autostart">
                <label class="form-check-label d-flex align-items-center gap-1" for="config-llama-autostart">
                    <span data-i18n="settings.llama_autostart">Auto-start llama.cpp on startup</span>
                    <i class="bi bi-question-circle text-muted" style="cursor:help" data-i18n-title="settings.tip_llama_autostart"></i>
                </label>
            </div>
            <div class="form-text" data-i18n="settings.llama_autostart_hint">
                Saves to config.json: llama_cpp.auto_start, llama_cpp.models_dir and llama_cpp.default_model
            </div>
        </div>
    </div>
</div>

<!-- ── FTP ────────────────────────────────────────────────────────────── -->
<div class="settings-section settings-section--ftp">
    <div class="settings-section-header text-secondary">
        <i class="bi bi-hdd-network"></i> FTP
    </div>
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Host</label>
            <input type="text" id="config-ftp-host" class="form-control" placeholder="ftp.example.com">
        </div>
        <div class="col-md-4">
            <label class="form-label">User</label>
            <input type="text" id="config-ftp-user" class="form-control" placeholder="username">
        </div>
        <div class="col-md-2">
            <label class="form-label">Port</label>
            <input type="number" id="config-ftp-port" class="form-control" placeholder="21">
        </div>
        <div class="col-12">
            <label class="form-label">Docs directory (remote path)</label>
            <input type="text" id="config-ftp-docs-dir" class="form-control font-monospace" placeholder="/domains/example.com/public_html/docs">
        </div>
    </div>
</div>

<!-- ── CUSTOM PROVIDER ────────────────────────────────────────────────── -->
<div class="settings-section settings-section--custom">
    <div class="settings-section-header text-info">
        <i class="bi bi-plug"></i> <span data-i18n="settings.custom_provider">Custom Provider</span>
    </div>
    <div class="row g-3">
        <div class="col-12">
            <label class="form-label">Base URL</label>
            <input type="text" id="config-custom-base-url" class="form-control font-monospace" placeholder="http://localhost:9696/v1">
        </div>
    </div>
</div>
