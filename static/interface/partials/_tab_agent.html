<div class="tab-pane fade" id="agent" role="tabpanel">
    <div class="row mt-3">

        <!-- Left: chat area -->
        <div class="col-md-8">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <i class="bi bi-robot"></i>
                        <span data-i18n="agent.title">AI Agent</span>
                        <span id="agent-active-badge" class="badge bg-secondary ms-2" style="font-size:.7rem">rag</span>
                    </h5>
                    <button class="btn btn-sm btn-outline-secondary" onclick="agentClearMessages()"
                            data-i18n-title="chat.clear">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
                <div class="card-body d-flex flex-column" style="min-height:420px">

                    <!-- Messages -->
                    <div id="agent-messages"
                         class="flex-grow-1 border rounded p-3 mb-3 overflow-auto"
                         style="min-height:300px;max-height:420px">
                        <div class="text-muted text-center p-4" id="agent-empty-hint">
                            <i class="bi bi-robot" style="font-size:2rem"></i><br>
                            <span data-i18n="agent.start_prompt">Send a task to the agent</span>
                        </div>
                    </div>

                    <!-- Keystroke special panel (shown only for keystroke agent) -->
                    <div id="keystroke-panel" style="display:none" class="mb-3">
                        <div class="card border-info">
                            <div class="card-header py-2 d-flex justify-content-between align-items-center"
                                 style="background:#e8f4fd">
                                <span style="font-size:.85rem;font-weight:600">
                                    <i class="bi bi-keyboard"></i>
                                    <span data-i18n="agent.ks_panel_title">Keystroke Data</span>
                                </span>
                                <div class="d-flex gap-1">
                                    <button class="btn btn-sm btn-outline-info" onclick="agentKsGenDemo()"
                                            title="Generate demo data">
                                        <i class="bi bi-magic"></i> <span data-i18n="agent.ks_demo">Demo</span>
                                    </button>
                                    <button class="btn btn-sm btn-info text-white" onclick="agentKsTrain()">
                                        <i class="bi bi-cpu"></i> <span data-i18n="agent.ks_train">Train</span>
                                    </button>
                                    <button class="btn btn-sm btn-success" onclick="agentKsPredict()">
                                        <i class="bi bi-search"></i> <span data-i18n="agent.ks_predict">Predict</span>
                                    </button>
                                </div>
                            </div>
                            <div class="card-body py-2" style="font-size:.82rem">
                                <!-- Users training data -->
                                <div class="mb-2">
                                    <label class="form-label mb-1 fw-semibold" data-i18n="agent.ks_users">
                                        Training data (user: sessions)
                                    </label>
                                    <textarea id="ks-users-data" class="form-control form-control-sm font-monospace"
                                              rows="4"
                                              placeholder='{"alice": [[95,110,88,102,91],[100,115,92,108,97]], "bob": [[145,160,138,152,141],[150,165,143,158,147]]}'></textarea>
                                    <div class="form-text" data-i18n="agent.ks_users_hint">
                                        JSON: {username: [[ms, ms, ...], ...]}
                                    </div>
                                </div>
                                <!-- Predict session -->
                                <div>
                                    <label class="form-label mb-1 fw-semibold" data-i18n="agent.ks_session">
                                        Session to identify
                                    </label>
                                    <div class="d-flex gap-2 align-items-start">
                                        <input type="text" id="ks-predict-session" class="form-control form-control-sm font-monospace"
                                               placeholder="[98, 105, 92, 110, 88, 101]">
                                        <button class="btn btn-sm btn-outline-secondary flex-shrink-0"
                                                onclick="agentKsRecordSession()"
                                                title="Type here to record keystrokes">
                                            <i class="bi bi-record-circle"></i>
                                        </button>
                                    </div>
                                    <div class="form-text" data-i18n="agent.ks_session_hint">
                                        List of key-press durations in ms
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Text input (hidden for keystroke) -->
                    <div id="agent-text-input-row" class="input-group">
                        <input type="text" id="agent-input" class="form-control"
                               data-i18n-placeholder="agent.placeholder"
                               placeholder="Describe a task for the agent...">
                        <button id="agent-btn" class="btn btn-primary" onclick="agentRun()">
                            <i class="bi bi-send"></i>
                            <span data-i18n="agent.run">Run</span>
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- Right: settings + tools -->
        <div class="col-md-4">

            <!-- Agent settings -->
            <div class="card mb-3">
                <div class="card-header">
                    <h6 class="mb-0" data-i18n="agent.settings">Agent Settings</h6>
                </div>
                <div class="card-body">

                    <div class="mb-3">
                        <label class="form-label" data-i18n="agent.select">Agent</label>
                        <select id="agent-name" class="form-select form-select-sm"
                                onchange="agentOnSelectChange()">
                            <option value="rag">rag</option>
                            <option value="keystroke">keystroke</option>
                            <option value="powershell">powershell</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" data-i18n="chat.model">Model</label>
                        <input type="text" id="agent-model" class="form-control form-control-sm"
                               data-i18n-placeholder="agent.model_placeholder"
                               placeholder="Leave empty to use default">
                        <div class="form-text" data-i18n="agent.model_hint">Uses config default if empty</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label mb-1">
                            <span data-i18n="chat.temperature">Temperature</span>:
                            <span id="agent-temp-value">0.3</span>
                        </label>
                        <input type="range" id="agent-temp" class="form-range"
                               min="0" max="1" step="0.1" value="0.3"
                               oninput="document.getElementById('agent-temp-value').textContent=this.value">
                    </div>

                    <div class="mb-0">
                        <label class="form-label" data-i18n="agent.max_iter">Max Iterations</label>
                        <input type="number" id="agent-max-iter" class="form-control form-control-sm"
                               value="5" min="1" max="20">
                    </div>
                </div>
            </div>

            <!-- Tools list -->
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0" data-i18n="agent.tools">Tools</h6>
                    <button class="btn btn-sm btn-outline-secondary" onclick="agentRefreshTools()"
                            data-i18n-title="common.refresh">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
                <div id="agent-tools-list" class="list-group list-group-flush"
                     style="max-height:220px;overflow-y:auto;font-size:.82rem">
                    <div class="text-muted text-center p-3" data-i18n="common.loading">Loading...</div>
                </div>
            </div>

        </div>
    </div>
</div>
