<!--
===============================================================================
Process Name: Support Chat Widget
===============================================================================
Description:
    Floating support chat window — accessible from any tab via the headset
    button in the navbar. Contains two panels:

    User panel  — chat with the Telegram HelpDesk bot (send messages,
                  view conversation history).
    Admin panel — view all user dialogs, manage RAG profiles, check bot status.
                  Visible only when the bot is configured (TELEGRAM_SUPPORT_TOKEN set).

File: partials/_support_widget.html
Project: AI Assistant (ai_assist)
Version: 0.7.1
Author: hypo69
Copyright: © 2026 hypo69
===============================================================================
-->

<!-- ── Support chat widget ─────────────────────────────────────────────────── -->
<div id="support-widget"
     style="display:none;position:fixed;bottom:1.5rem;right:1.5rem;z-index:1050;
            width:380px;max-width:calc(100vw - 2rem);
            box-shadow:0 8px 32px rgba(0,0,0,.18);border-radius:.75rem;overflow:hidden">

    <div class="card mb-0 border-0">

        <!-- Header -->
        <div class="card-header d-flex align-items-center gap-2 py-2"
             style="background:var(--bs-primary);color:#fff">
            <i class="bi bi-headset fs-5"></i>
            <span class="fw-semibold flex-grow-1" data-i18n="support.widget_title">Support</span>

            <!-- Admin toggle (shown only when bot is active) -->
            <button id="support-admin-btn"
                    class="btn btn-sm btn-outline-light py-0 px-2"
                    onclick="supportToggleAdminPanel()"
                    title="Admin panel"
                    style="display:none;font-size:.75rem">
                <i class="bi bi-gear"></i>
            </button>

            <!-- Close -->
            <button class="btn btn-sm btn-outline-light py-0 px-2"
                    onclick="supportToggleChat()"
                    title="Close">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <!-- ── User chat panel ──────────────────────────────────────────────── -->
        <div id="support-user-panel">

            <!-- Bot status bar -->
            <div id="support-bot-bar"
                 class="px-3 py-1 d-flex align-items-center gap-2"
                 style="background:#f8f9fa;border-bottom:1px solid #dee2e6;font-size:.8rem">
                <span id="support-bot-dot" class="badge bg-secondary" style="width:.6rem;height:.6rem;padding:0;border-radius:50%"></span>
                <span id="support-bot-label" class="text-muted" data-i18n="support.loading">Loading...</span>
            </div>

            <!-- Messages -->
            <div id="support-chat-messages"
                 style="height:320px;overflow-y:auto;padding:1rem;background:#fff">
                <div class="text-center text-muted mt-5" style="font-size:.85rem">
                    <i class="bi bi-chat-square-dots fs-2 d-block mb-2 opacity-25"></i>
                    <span data-i18n="support.chat_placeholder">Send a message to start a conversation</span>
                </div>
            </div>

            <!-- Input -->
            <div class="p-2 border-top d-flex gap-2" style="background:#f8f9fa">
                <input type="text" id="support-chat-input"
                       class="form-control form-control-sm"
                       data-i18n-placeholder="support.input_placeholder"
                       placeholder="Type a message..."
                       onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();supportSendMessage();}">
                <button class="btn btn-primary btn-sm px-3" onclick="supportSendMessage()">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
        </div>

        <!-- ── Admin panel ──────────────────────────────────────────────────── -->
        <div id="support-admin-panel" style="display:none">

            <!-- Tabs inside admin panel -->
            <ul class="nav nav-tabs nav-sm px-2 pt-2" style="font-size:.8rem">
                <li class="nav-item">
                    <button class="nav-link active py-1 px-2" id="sadmin-dialogs-tab"
                            onclick="supportAdminTab('dialogs')">
                        <i class="bi bi-chat-left-text"></i>
                        <span data-i18n="support.dialogs">Dialogs</span>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link py-1 px-2" id="sadmin-rag-tab"
                            onclick="supportAdminTab('rag')">
                        <i class="bi bi-search"></i>
                        <span data-i18n="support.rag_profiles">RAG Profiles</span>
                    </button>
                </li>
            </ul>

            <!-- Dialogs sub-panel -->
            <div id="sadmin-dialogs" style="height:380px">
                <div class="d-flex h-100">
                    <!-- User list -->
                    <div id="support-users"
                         class="border-end overflow-auto"
                         style="width:130px;min-width:110px;font-size:.8rem">
                        <div class="text-muted small p-2" data-i18n="support.no_dialogs">No dialogs yet</div>
                    </div>
                    <!-- Messages -->
                    <div class="flex-grow-1 d-flex flex-column overflow-hidden">
                        <div id="support-messages"
                             class="flex-grow-1 overflow-auto p-2"
                             style="font-size:.82rem">
                            <div class="text-muted text-center mt-4">
                                <i class="bi bi-chat-square-dots"></i><br>
                                <span data-i18n="support.select_user">Select a user</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RAG sub-panel -->
            <div id="sadmin-rag" style="display:none;height:380px;overflow-y:auto;padding:.75rem">

                <!-- Bot status -->
                <div class="mb-3">
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <span data-i18n="support.bot_status" class="fw-semibold small">Bot Status</span>
                        <div id="support-status-badge">
                            <span class="badge bg-secondary" data-i18n="support.loading">Loading...</span>
                        </div>
                    </div>
                    <div class="small text-muted">
                        <span data-i18n="support.rag_profile_label">RAG Profile:</span>
                        <strong id="support-rag-profile-name">—</strong>
                    </div>
                    <div class="small text-muted mt-1" data-i18n="support.token_hint">
                        Set TELEGRAM_SUPPORT_TOKEN in .env to enable.
                    </div>
                </div>

                <hr class="my-2">

                <!-- Profile list -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="fw-semibold small" data-i18n="support.rag_profiles">RAG Profiles</span>
                    <button class="btn btn-sm btn-outline-secondary py-0 px-1" onclick="supportLoadProfiles()">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
                <div id="support-profiles-list" class="mb-3">
                    <div class="text-muted small" data-i18n="support.no_profiles">No profiles found</div>
                </div>

                <!-- Create profile -->
                <div>
                    <input type="text" id="support-new-profile-name"
                           class="form-control form-control-sm mb-1"
                           data-i18n-placeholder="support.profile_name"
                           placeholder="Profile name">
                    <input type="text" id="support-new-profile-desc"
                           class="form-control form-control-sm mb-1"
                           data-i18n-placeholder="support.profile_desc"
                           placeholder="Description (optional)">
                    <button class="btn btn-sm btn-primary w-100" onclick="supportCreateProfile()">
                        <i class="bi bi-plus-circle"></i>
                        <span data-i18n="support.create_profile">Create Profile</span>
                    </button>
                </div>
            </div>

        </div><!-- /admin panel -->

    </div><!-- /card -->
</div><!-- /widget -->
