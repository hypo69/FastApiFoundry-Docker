<div class="tab-pane fade" id="models" role="tabpanel">
                <div class="row mt-3">

                    <!-- Active / loaded models — TOP -->
                    <div class="col-12 mb-3">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0" data-i18n="models.title">Connected Models</h5>
                                <button class="btn btn-sm btn-outline-primary" onclick="refreshModels()">
                                    <i class="bi bi-arrow-clockwise"></i> <span data-i18n="models.refresh">Refresh</span>
                                </button>
                            </div>
                            <div class="card-body p-0">
                                <div id="models-container" class="row g-0 p-3"></div>
                            </div>
                        </div>
                    </div>

                    <!-- All available (cached) models — BOTTOM -->
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0" data-i18n="models.available">Available Models</h5>
                                <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#addModelModal">
                                    <i class="bi bi-plus-circle"></i> <span data-i18n="models.add">Add Model</span>
                                </button>
                            </div>
                            <div class="card-body p-0">
                                <div id="models-list" style="max-height:420px;overflow-y:auto"></div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
