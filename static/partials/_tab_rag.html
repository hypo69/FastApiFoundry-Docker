<div class="tab-pane fade" id="rag" role="tabpanel">
                <div class="row mt-3">
                    <div class="col-md-5">
                        <div class="card mb-3">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="mb-0"><i class="bi bi-activity"></i> <span data-i18n="rag.active_base">Active RAG Base</span></h6>
                                <button class="btn btn-sm btn-outline-primary" onclick="refreshRAGStatus()">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                            </div>
                            <div class="card-body" id="rag-status">
                                <div class="text-muted text-center"><small data-i18n="common.loading">Loading...</small></div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="mb-0"><i class="bi bi-collection"></i> <span data-i18n="rag.bases">RAG Bases (~/.rag)</span></h6>
                                <button class="btn btn-sm btn-outline-primary" onclick="ragLoadProfiles()">
                                    <i class="bi bi-arrow-clockwise"></i> <span data-i18n="rag.refresh">Refresh</span>
                                </button>
                            </div>
                            <div class="card-body p-0">
                                <div id="rag-profiles-list" style="max-height:300px;overflow-y:auto">
                                    <div class="text-muted text-center p-3"><small data-i18n="rag.no_bases">No RAG bases yet.</small></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="card mb-3">
                            <div class="card-header">
                                <h6 class="mb-0"><i class="bi bi-database-add"></i> <span data-i18n="rag.build_title">Build New RAG Base</span></h6>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label" data-i18n="rag.source_dir">Source Directory</label>
                                    <div class="input-group">
                                        <input type="text" id="rag-selected-dir" class="form-control font-monospace"
                                               data-i18n-placeholder="rag.browse_hint" placeholder="Path will appear here..." readonly>
                                        <label class="btn btn-outline-secondary mb-0">
                                            <i class="bi bi-folder2-open"></i>
                                            <input type="file" id="rag-dir-input" webkitdirectory directory multiple
                                                   style="display:none" onchange="ragOnDirSelected(this)">
                                        </label>
                                    </div>
                                    <div id="rag-dir-status" class="mt-1" style="display:none"></div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-6">
                                        <label class="form-label" data-i18n="rag.chunk_size">Chunk size</label>
                                        <input type="number" id="rag-build-chunk" class="form-control" value="1000">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label" data-i18n="rag.overlap">Overlap</label>
                                        <input type="number" id="rag-build-overlap" class="form-control" value="50">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" data-i18n="rag.embedding_model">Embedding model</label>
                                    <select id="rag-build-model" class="form-select">
                                        <option value="sentence-transformers/all-mpnet-base-v2">all-mpnet-base-v2 (recommended)</option>
                                        <option value="sentence-transformers/all-MiniLM-L6-v2">all-MiniLM-L6-v2 (fast)</option>
                                        <option value="sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2">paraphrase-multilingual</option>
                                    </select>
                                </div>
                                <div class="d-grid gap-2">
                                    <button class="btn btn-success" id="rag-build-btn" onclick="ragBuildIndex()">
                                        <i class="bi bi-database-add"></i> <span data-i18n="rag.build">Build Index</span>
                                    </button>
                                    <button class="btn btn-outline-danger" onclick="ragBuildIndex(true)">
                                        <i class="bi bi-arrow-repeat"></i> <span data-i18n="rag.rebuild">Rebuild (force)</span>
                                    </button>
                                </div>
                                <div id="rag-build-status" class="mt-3" style="display:none"></div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0"><i class="bi bi-search"></i> <span data-i18n="rag.test_search">Test Search</span></h6>
                            </div>
                            <div class="card-body">
                                <div class="input-group mb-2">
                                    <input type="text" id="rag-test-query" class="form-control"
                                           data-i18n-placeholder="rag.search_placeholder"
                                           placeholder="Enter test query...">
                                    <button class="btn btn-info" onclick="testRAGSearch()">
                                        <i class="bi bi-search"></i> <span data-i18n="rag.search_btn">Search</span>
                                    </button>
                                </div>
                                <div id="rag-test-results" style="display:none">
                                    <div id="rag-search-output" class="border rounded p-2"
                                         style="max-height:200px;overflow-y:auto;font-size:.85rem"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Text Extractor section -->
                <div class="row mt-3">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="mb-0"><i class="bi bi-file-earmark-text"></i> <span data-i18n="rag.extractor_title">Text Extractor</span></h6>
                                <span class="badge bg-secondary" data-i18n="rag.extractor_badge">40+ formats</span>
                            </div>
                            <div class="card-body">
                                <p class="text-muted small mb-3" data-i18n="rag.extractor_hint">
                                    Extract text from files or URLs to preview content before indexing.
                                    Supports PDF, DOCX, XLSX, PPTX, images (OCR), HTML, archives and more.
                                </p>

                                <!-- Tabs: File / URL -->
                                <ul class="nav nav-tabs nav-sm mb-3" id="extractorTabs" role="tablist">
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link active" id="ext-file-tab" data-bs-toggle="tab"
                                                data-bs-target="#ext-file-pane" type="button" role="tab">
                                            <i class="bi bi-file-earmark-arrow-up"></i>
                                            <span data-i18n="rag.extractor_file">File</span>
                                        </button>
                                    </li>
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link" id="ext-url-tab" data-bs-toggle="tab"
                                                data-bs-target="#ext-url-pane" type="button" role="tab">
                                            <i class="bi bi-globe"></i>
                                            <span data-i18n="rag.extractor_url">URL</span>
                                        </button>
                                    </li>
                                </ul>

                                <div class="tab-content">
                                    <!-- File extraction -->
                                    <div class="tab-pane fade show active" id="ext-file-pane" role="tabpanel">
                                        <div class="input-group mb-2">
                                            <input type="file" id="ext-file-input" class="form-control"
                                                   accept=".pdf,.docx,.doc,.xlsx,.xls,.pptx,.ppt,.txt,.html,.htm,.md,.json,.xml,.yaml,.yml,.csv,.odt,.rtf,.epub,.eml,.msg,.zip,.rar,.7z,.tar,.gz,.jpg,.jpeg,.png,.tiff,.bmp,.gif,.py,.js,.ts,.php,.rb,.go,.rs,.cs,.java,.cpp,.c,.sh,.ps1">
                                            <button class="btn btn-primary" onclick="extractFromFile()" id="ext-file-btn">
                                                <i class="bi bi-play-fill"></i>
                                                <span data-i18n="rag.extractor_extract">Extract</span>
                                            </button>
                                        </div>
                                    </div>

                                    <!-- URL extraction -->
                                    <div class="tab-pane fade" id="ext-url-pane" role="tabpanel">
                                        <div class="input-group mb-2">
                                            <input type="text" id="ext-url-input" class="form-control"
                                                   placeholder="https://example.com/document.pdf"
                                                   data-i18n-placeholder="rag.extractor_url_placeholder">
                                            <button class="btn btn-primary" onclick="extractFromURL()" id="ext-url-btn">
                                                <i class="bi bi-play-fill"></i>
                                                <span data-i18n="rag.extractor_extract">Extract</span>
                                            </button>
                                        </div>
                                        <div class="row g-2 mb-2">
                                            <div class="col-auto">
                                                <div class="form-check form-check-inline">
                                                    <input class="form-check-input" type="checkbox" id="ext-js-enabled">
                                                    <label class="form-check-label small" for="ext-js-enabled"
                                                           data-i18n="rag.extractor_js">JavaScript</label>
                                                </div>
                                            </div>
                                            <div class="col-auto">
                                                <div class="form-check form-check-inline">
                                                    <input class="form-check-input" type="checkbox" id="ext-images-enabled">
                                                    <label class="form-check-label small" for="ext-images-enabled"
                                                           data-i18n="rag.extractor_images">OCR images</label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Result -->
                                <div id="ext-result" style="display:none">
                                    <div class="d-flex justify-content-between align-items-center mb-1">
                                        <small class="text-muted" id="ext-result-meta"></small>
                                        <button class="btn btn-sm btn-outline-secondary" onclick="copyExtractedText()">
                                            <i class="bi bi-clipboard"></i>
                                            <span data-i18n="rag.extractor_copy">Copy</span>
                                        </button>
                                    </div>
                                    <textarea id="ext-result-text" class="form-control font-monospace"
                                              rows="8" readonly
                                              style="font-size:.8rem;resize:vertical"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
