<div class="tab-pane fade" id="rag" role="tabpanel">
                <div class="row mt-3">

                    <!-- Левая колонка: статус + профили -->
                    <div class="col-md-5">

                        <!-- Статус активной базы -->
                        <div class="card mb-3">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="mb-0"><i class="bi bi-activity"></i> Active RAG Base</h6>
                                <button class="btn btn-sm btn-outline-primary" onclick="refreshRAGStatus()">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                            </div>
                            <div class="card-body" id="rag-status">
                                <div class="text-muted text-center"><small>Click refresh to check</small></div>
                            </div>
                        </div>

                        <!-- Список баз в ~/.rag -->
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="mb-0"><i class="bi bi-collection"></i> RAG Bases (~/.rag)</h6>
                                <button class="btn btn-sm btn-outline-primary" onclick="ragLoadProfiles()">
                                    <i class="bi bi-arrow-clockwise"></i> Refresh
                                </button>
                            </div>
                            <div class="card-body p-0">
                                <div id="rag-profiles-list" style="max-height:300px;overflow-y:auto">
                                    <div class="text-muted text-center p-3"><small>Click Refresh to load</small></div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- Правая колонка: создание новой базы -->
                    <div class="col-md-7">
                        <div class="card mb-3">
                            <div class="card-header"><h6 class="mb-0"><i class="bi bi-database-add"></i> Build New RAG Base</h6></div>
                            <div class="card-body">

                                <!-- Браузер директорий -->
                                <div class="mb-3">
                                    <label class="form-label">Source Directory</label>
                                    <div class="input-group mb-1">
                                        <input type="text" id="rag-selected-dir" class="form-control font-monospace"
                                               placeholder="Select directory below or type path..." readonly>
                                        <button class="btn btn-outline-secondary" onclick="ragBrowseHome()" title="Go to home">
                                            <i class="bi bi-house"></i>
                                        </button>
                                    </div>
                                    <!-- Браузер файловой системы -->
                                    <div id="rag-browser" class="border rounded" style="max-height:200px;overflow-y:auto;font-size:.85rem">
                                        <div class="text-muted text-center p-3"><small>Click <i class="bi bi-house"></i> to browse</small></div>
                                    </div>
                                    <!-- Индикатор: уже проиндексирована? -->
                                    <div id="rag-dir-status" class="mt-1" style="display:none"></div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-6">
                                        <label class="form-label">Chunk size</label>
                                        <input type="number" id="rag-build-chunk" class="form-control" value="1000">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label">Overlap</label>
                                        <input type="number" id="rag-build-overlap" class="form-control" value="50">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Embedding model</label>
                                    <select id="rag-build-model" class="form-select">
                                        <option value="sentence-transformers/all-mpnet-base-v2">all-mpnet-base-v2 (recommended)</option>
                                        <option value="sentence-transformers/all-MiniLM-L6-v2">all-MiniLM-L6-v2 (fast)</option>
                                        <option value="sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2">paraphrase-multilingual</option>
                                    </select>
                                </div>

                                <div class="d-grid gap-2">
                                    <button class="btn btn-success" id="rag-build-btn" onclick="ragBuildIndex()">
                                        <i class="bi bi-database-add"></i> Build Index
                                    </button>
                                    <button class="btn btn-outline-danger" onclick="ragBuildIndex(true)">
                                        <i class="bi bi-arrow-repeat"></i> Rebuild (force)
                                    </button>
                                </div>
                                <div id="rag-build-status" class="mt-3" style="display:none"></div>
                            </div>
                        </div>

                        <!-- Тестовый поиск -->
                        <div class="card">
                            <div class="card-header"><h6 class="mb-0"><i class="bi bi-search"></i> Test Search</h6></div>
                            <div class="card-body">
                                <div class="input-group mb-2">
                                    <input type="text" id="rag-test-query" class="form-control" placeholder="Enter test query...">
                                    <button class="btn btn-info" onclick="testRAGSearch()">
                                        <i class="bi bi-search"></i> Search
                                    </button>
                                </div>
                                <div id="rag-test-results" style="display:none">
                                    <div id="rag-search-output" class="border rounded p-2"
                                         style="max-height:200px;overflow-y:auto;font-size:.85rem"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
