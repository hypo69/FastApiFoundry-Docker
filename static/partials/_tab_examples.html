<div class="tab-pane fade" id="examples" role="tabpanel">
                <div class="row mt-3">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">FastAPI Foundry SDK Examples</h5>
                                <button class="btn btn-sm btn-outline-primary" onclick="loadExamples()">
                                    <i class="bi bi-arrow-clockwise"></i> <span data-i18n="common.refresh">Refresh</span>
                                </button>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label">Select Example</label>
                                    <select id="example-select" class="form-select" onchange="loadSelectedExample()">
                                        <option value="">Select an example...</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Example Code</label>
                                    <textarea id="example-code" class="form-control" rows="15" readonly style="font-family:monospace;"></textarea>
                                </div>
                                <button class="btn btn-primary" onclick="runExample()">
                                    <i class="bi bi-play-fill"></i> Run Example
                                </button>
                                <button class="btn btn-secondary" onclick="copyExampleToClipboard()">
                                    <i class="bi bi-clipboard"></i> Copy
                                </button>
                                <div id="example-output" class="mt-3 border rounded p-3 bg-light"
                                     style="display:none;min-height:60px;white-space:pre-wrap;font-size:0.9rem"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header"><h5 class="mb-0" data-i18n="common.notes">Notes</h5></div>
                            <div class="card-body">
                                <p class="card-text">Test SDK usage examples here. Make sure the FastAPI Foundry server is running before executing.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
