<div class="tab-pane fade" id="settings" role="tabpanel">
                <div class="row mt-3">
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0" data-i18n="settings.system_status">System Status</h5>
                            </div>
                            <div class="card-body" id="system-status"></div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0" data-i18n="settings.title">Configuration</h5>
                                <div>
                                    <button class="btn btn-sm btn-outline-secondary" onclick="exportConfig()">
                                        <i class="bi bi-download"></i> <span data-i18n="settings.export">Export</span>
                                    </button>
                                    <label class="btn btn-sm btn-outline-secondary mb-0">
                                        <i class="bi bi-upload"></i> <span data-i18n="settings.import">Import</span>
                                        <input type="file" id="import-config-file" accept=".json" style="display:none" onchange="importConfig(event)">
                                    </label>
                                    <button class="btn btn-sm btn-outline-primary" onclick="loadConfigFields()">
                                        <i class="bi bi-arrow-clockwise"></i> <span data-i18n="settings.reload">Reload</span>
                                    </button>
                                    <button class="btn btn-sm btn-success" onclick="saveConfigFields()">
                                        <i class="bi bi-check-lg"></i> <span data-i18n="settings.save_all">Save All</span>
                                    </button>
                                </div>
                            </div>
                            <div class="card-body" id="settings-card-body" style="overflow-y:auto;">

                                <!-- Ports -->
                                <div class="mb-4">
                                    <h6 class="text-primary"><i class="bi bi-hdd-network"></i> <span data-i18n="settings.ports">Ports</span></h6>
                                    <div class="row">
                                        <div class="col-md-4">
                                            <label class="form-label">FastAPI</label>
                                            <input type="number" id="config-api-port" class="form-control" placeholder="9696">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">llama.cpp</label>
                                            <input type="number" id="config-llama-port" class="form-control" placeholder="9780">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">MkDocs</label>
                                            <input type="number" id="config-docs-port" class="form-control" placeholder="9697">
                                        </div>
                                    </div>
                                </div>

                                <!-- Directories -->
                                <div class="mb-4">
                                    <h6 class="text-primary"><i class="bi bi-folder2"></i> <span data-i18n="settings.directories">Directories</span></h6>
                                    <div class="row">
                                        <div class="col-md-4">
                                            <label class="form-label" data-i18n="settings.dir_models">GGUF models (llama.cpp)</label>
                                            <input type="text" id="config-dir-models" class="form-control font-monospace" placeholder="~/.models">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label" data-i18n="settings.dir_rag">RAG bases</label>
                                            <input type="text" id="config-dir-rag" class="form-control font-monospace" placeholder="~/.rag">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label" data-i18n="settings.dir_hf">HuggingFace models</label>
                                            <input type="text" id="config-dir-hf" class="form-control font-monospace" placeholder="~/.hf_models">
                                        </div>
                                    </div>
                                    <div class="form-text" data-i18n="settings.dir_hint">~/ is the user home directory.</div>
                                </div>

                                <!-- FastAPI Server -->
                                <div class="mb-4">
                                    <h6 class="text-primary"><i class="bi bi-server"></i> <span data-i18n="settings.fastapi_server">FastAPI Server</span></h6>
                                    <div class="row">
                                        <div class="col-md-6">
                                            <label class="form-label" data-i18n="settings.host">Host</label>
                                            <input type="text" id="config-api-host" class="form-control" placeholder="0.0.0.0">
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-check mt-4">
                                                <input class="form-check-input" type="checkbox" id="config-api-auto-port">
                                                <label class="form-check-label" for="config-api-auto-port" data-i18n="settings.auto_port">Auto-find free port</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label" data-i18n="settings.mode">Mode</label>
                                            <select id="config-api-mode" class="form-select">
                                                <option value="dev" data-i18n="settings.mode_dev">Development</option>
                                                <option value="prod" data-i18n="settings.mode_prod">Production</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label" data-i18n="settings.workers">Workers</label>
                                            <input type="number" id="config-api-workers" class="form-control" placeholder="1">
                                        </div>
                                    </div>
                                </div>

                                <!-- Foundry AI -->
                                <div class="mb-4">
                                    <h6 class="text-success"><i class="bi bi-robot"></i> <span data-i18n="settings.foundry_ai">Foundry AI</span></h6>
                                    <div class="row">
                                        <div class="col-md-12">
                                            <label class="form-label" data-i18n="settings.base_url">Base URL</label>
                                            <input type="url" id="config-foundry-url" class="form-control" placeholder="http://localhost:50477/v1/">
                                        </div>
                                        <div class="col-md-12">
                                            <label class="form-label" data-i18n="settings.default_model">Default Model</label>
                                            <input type="text" id="config-foundry-model" class="form-control" placeholder="deepseek-r1-distill-qwen-7b-generic-cpu:3">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label" data-i18n="settings.temperature">Temperature</label>
                                            <input type="number" id="config-foundry-temp" class="form-control" step="0.1" min="0" max="2" placeholder="0.6">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label" data-i18n="settings.max_tokens">Max Tokens</label>
                                            <input type="number" id="config-foundry-tokens" class="form-control" placeholder="2048">
                                        </div>
                                        <div class="col-md-12">
                                            <div class="form-check mt-2">
                                                <input class="form-check-input" type="checkbox" id="config-foundry-autoload">
                                                <label class="form-check-label" for="config-foundry-autoload" data-i18n="settings.auto_load">Auto-load default model on startup</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- RAG System -->
                                <div class="mb-4">
                                    <h6 class="text-info"><i class="bi bi-search"></i> <span data-i18n="settings.rag_system">RAG System</span></h6>
                                    <div class="row">
                                        <div class="col-md-12">
                                            <div class="form-check mb-2">
                                                <input class="form-check-input" type="checkbox" id="config-rag-enabled" onchange="handleRAGToggle(this)">
                                                <label class="form-check-label" for="config-rag-enabled" data-i18n="settings.enable_rag">Enable RAG System</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label" data-i18n="settings.index_dir">Index Directory</label>
                                            <input type="text" id="config-rag-index" class="form-control" placeholder="~/.rag">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label" data-i18n="settings.chunk_size">Chunk Size</label>
                                            <input type="number" id="config-rag-chunk" class="form-control" placeholder="1000">
                                        </div>
                                        <div class="col-md-12 mt-2">
                                            <button class="btn btn-warning" onclick="clearRAGChunks()">
                                                <i class="bi bi-trash"></i> <span data-i18n="settings.clear_rag">Clear RAG chunks</span>
                                            </button>
                                            <small class="form-text text-muted d-block mt-1" data-i18n="settings.clear_rag_hint">Remove all indexed documents from the RAG system</small>
                                        </div>
                                    </div>
                                </div>

                                <!-- Security -->
                                <div class="mb-4">
                                    <h6 class="text-warning"><i class="bi bi-shield-lock"></i> <span data-i18n="settings.security">Security</span></h6>
                                    <div class="row">
                                        <div class="col-md-12">
                                            <label class="form-label" data-i18n="settings.api_key">API Key</label>
                                            <input type="password" id="config-security-key" class="form-control"
                                                   data-i18n-placeholder="settings.api_key_hint" placeholder="Leave empty to disable">
                                        </div>
                                        <div class="col-md-12 mt-2">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="config-security-https">
                                                <label class="form-check-label" for="config-security-https" data-i18n="settings.enable_https">Enable HTTPS</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Logging -->
                                <div class="mb-4">
                                    <h6 class="text-secondary"><i class="bi bi-file-text"></i> <span data-i18n="settings.logging">Logging</span></h6>
                                    <div class="row">
                                        <div class="col-md-6">
                                            <label class="form-label" data-i18n="settings.log_level">Log Level</label>
                                            <select id="config-log-level" class="form-select">
                                                <option value="DEBUG">Debug</option>
                                                <option value="INFO">Info</option>
                                                <option value="WARNING">Warning</option>
                                                <option value="ERROR">Error</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label" data-i18n="settings.log_file">Log File</label>
                                            <input type="text" id="config-log-file" class="form-control" placeholder="logs/fastapi-foundry.log">
                                        </div>
                                    </div>
                                </div>

                                <!-- HuggingFace -->
                                <div class="mb-4">
                                    <h6 class="text-danger"><i class="bi bi-boxes"></i> <span data-i18n="settings.huggingface">HuggingFace</span></h6>
                                    <div class="row">
                                        <div class="col-md-12">
                                            <label class="form-label">
                                                <span data-i18n="settings.hf_token">HF Token</span>
                                                <small class="text-muted" data-i18n="settings.hf_token_hint">(for gated models)</small>
                                            </label>
                                            <div class="input-group">
                                                <input type="password" id="config-hf-token" class="form-control" placeholder="hf_...">
                                                <button class="btn btn-outline-success" type="button" onclick="saveHFToken()">
                                                    <i class="bi bi-floppy"></i> <span data-i18n="settings.hf_token_save">Save</span>
                                                </button>
                                            </div>
                                            <div class="form-text">
                                                <span data-i18n="settings.hf_token_link">Get token</span>:
                                                <a href="https://huggingface.co/settings/tokens" target="_blank">huggingface.co/settings/tokens</a>
                                            </div>
                                        </div>
                                        <div class="col-md-6 mt-2">
                                            <label class="form-label" data-i18n="settings.device">Device</label>
                                            <select id="config-hf-device" class="form-select">
                                                <option value="auto" data-i18n="settings.device_auto">Auto</option>
                                                <option value="cpu" data-i18n="settings.device_cpu">CPU</option>
                                                <option value="cuda" data-i18n="settings.device_cuda">CUDA (GPU)</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mt-2">
                                            <label class="form-label" data-i18n="settings.default_max_tokens">Default Max Tokens</label>
                                            <input type="number" id="config-hf-max-tokens" class="form-control" placeholder="512">
                                        </div>
                                    </div>
                                </div>

                                <!-- Docs Server -->
                                <div class="mb-4">
                                    <h6 class="text-dark"><i class="bi bi-book"></i> <span data-i18n="settings.docs_server">Docs Server (MkDocs)</span></h6>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="config-docs-enabled">
                                        <label class="form-check-label" for="config-docs-enabled" data-i18n="settings.enable_docs">Enable MkDocs server on startup</label>
                                    </div>
                                </div>

                                <!-- Development -->
                                <div class="mb-4">
                                    <h6 class="text-dark"><i class="bi bi-code-slash"></i> <span data-i18n="settings.development">Development</span></h6>
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="config-dev-debug">
                                                <label class="form-check-label" for="config-dev-debug" data-i18n="settings.debug_mode">Debug Mode</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="config-dev-verbose">
                                                <label class="form-check-label" for="config-dev-verbose" data-i18n="settings.verbose_logging">Verbose Logging</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Language -->
                                <div class="mb-4">
                                    <h6 class="text-dark"><i class="bi bi-translate"></i> <span data-i18n="settings.language">Language</span></h6>
                                    <select class="form-select" style="max-width:200px" onchange="switchLang(this.value)" id="lang-selector-settings">
                                        <option value="en">English</option>
                                        <option value="ru">Русский</option>
                                        <option value="he">עברית</option>
                                    </select>
                                </div>

                                <div id="config-status" class="alert" style="display:none;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
