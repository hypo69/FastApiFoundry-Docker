<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Foundry - AI Models Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/main.css?v=0.5.6" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23.11.5/i18next.min.js"></script>
</head>
<body>

    <!-- Loading overlay — visible immediately, hidden after app init -->
    <div id="app-loading-overlay">
        <div id="app-loading-box">
            <div class="app-loading-spinner"></div>
            <div id="app-loading-title">FastAPI Foundry</div>
            <div id="app-loading-status">Загрузка интерфейса...</div>
        </div>
    </div>

    <style>
        #app-loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.97);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.35s ease;
        }
        #app-loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        #app-loading-box {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .app-loading-spinner {
            width: 52px;
            height: 52px;
            border: 5px solid #dee2e6;
            border-top-color: #0d6efd;
            border-radius: 50%;
            animation: app-spin 0.8s linear infinite;
        }
        @keyframes app-spin {
            to { transform: rotate(360deg); }
        }
        #app-loading-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #212529;
        }
        #app-loading-status {
            font-size: 0.9rem;
            color: #6c757d;
        }
    </style>

    <!-- Navbar -->
    <div id="slot-navbar"></div>

    <div class="container mt-4">
        <!-- Tabs navigation -->
        <div id="slot-tabs-nav"></div>

        <!-- Tab content — partials injected directly by app.js -->
        <div class="tab-content" id="mainTabsContent"></div>
    </div>

    <!-- Modals injected by app.js -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <script type="module" src="/static/app.js"></script>
</body>
</html>
