<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Foundry - Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
</head>
<body>
    <!-- Этот файл control.html предназначен для отдельной панели управления. -->
    <!-- Его содержимое должно быть аналогично вкладкам в index.html, -->
    <!-- но с полной HTML-структурой и подключением app.js для логики. -->
    <!-- Для рефакторинга index.html, этот файл не изменяется напрямую, -->
    <!-- но его логика переносится в модули JS. -->
    <!-- Здесь должен быть полный HTML-код панели управления, который будет использовать функции из app.js -->
    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h5>Control Panel Placeholder</h5>
            </div>
            <div class="card-body">
                <p>This is a placeholder for the Control Panel content. All dynamic logic is handled by external JavaScript modules.</p>
                <button class="btn btn-primary" onclick="window.checkSystemStatus()">Check Status</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <script type="module" src="/static/app.js"></script>
</body>
</html>
