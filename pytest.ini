# =============================================================================
# Название процесса: Конфигурация Pytest
# =============================================================================
# Описание:
#   Файл настроек для запуска тестов.
#   Определяет пути поиска, исключения и стандартные параметры вывода.
# =============================================================================

[pytest]
# Пути для поиска тестов
testpaths = tests

# Исключение директорий из сканирования
norecursedirs = extensions .git .venv venv build dist

# Настройка асинхронности
asyncio_mode = auto

# Параметры запуска по умолчанию
# -v: подробный вывод
addopts = -v --tb=short