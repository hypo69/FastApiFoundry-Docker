<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Foundry — Installer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/main.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23.11.5/i18next.min.js"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-robot"></i> FastAPI Foundry
            </a>
            <div class="navbar-nav ms-auto d-flex align-items-center gap-3">
                <select id="lang-selector" class="form-select form-select-sm"
                        style="width:auto;background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3);"
                        onchange="window.switchLang(this.value)">
                    <option value="en">EN</option>
                    <option value="ru">RU</option>
                </select>
                <span class="navbar-text text-white-50 small" data-i18n="nav.installer">Installer</span>
            </div>
        </div>
    </nav>

    <!-- Status bar -->
    <div id="status-bar" class="status-bar">
        <span id="status-venv"  class="status-chip"><i class="bi bi-box"></i> venv</span>
        <span id="status-env"   class="status-chip"><i class="bi bi-file-earmark-text"></i> .env</span>
        <span id="status-foundry" class="status-chip"><i class="bi bi-cpu"></i> Foundry</span>
    </div>

    <div class="container mt-4">

        <!-- Tabs nav -->
        <ul class="nav nav-tabs" id="installTabs" role="tablist"></ul>

        <!-- Tab content -->
        <div class="tab-content mt-0" id="installTabsContent"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <script type="module" src="/static/app.js"></script>
</body>
</html>
